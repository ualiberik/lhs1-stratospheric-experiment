# EXP-04: Regolith Configuration — Atmosphere
# Dataset 4 of 5

experiment:
  id: 4
  title: "LHS-1 Regolith Thermal Insulation at 1 atm"
  date: 2026-06-25

hardware:
  mcp9808:
    installed: true
    role: "Under-regolith temperature — DEPENDENT variable"
    i2c_address: "0x18"
    resolution: 3        # 0.0625 °C
  regolith-shield:
    installed: true
    material: "LHS-1 Lunar Highlands Simulant (Exolith Lab)"
    thickness_mm: 3.0
    bulk_density_g_cm3: 1.6
  bmp388:
    installed: true
    role: "External temperature & pressure — INDEPENDENT variables"
    shielded: false

firmware:
  file: "firmware/ion_2026_berikov/ion_2026_berikov.ino"
  define: "BALLOON"
  awake_time_s: 60
  sleep_time_s: 600
  write_interval_ms: 100

environment:
  pressure_atm: 1.0      # ambient, no vacuum chamber
  temperature_method: "Heat the cube, then observe cooling"

protocol:
  steps:
    1: "Delete existing log files from device (boot → Y → W → Delete)"
    2: "Heat the payload externally to ~60–70 °C (heat gun, warm water bath, etc.)"
    3: "Power on the device. Do NOT press Y — let it boot into flight mode autonomously."
    4: "Note wall-clock start time. Wait ~10 min for temperature to equalize across the cube."
    5: "Observe cooling to ambient. Run for minimum 3 hours (≥16 wake/sleep cycles)."
    6: "Retrieve data: boot → Y → W → Download ION-<UniqueID>.log"
    7: "Save as: data/raw/EXP04_YYYYMMDD_HHmm_regolith_atm.log"

data_stream:
  note: "CSV, no header. Wakeup boundaries marked by '00000000-000000' separator lines."
  key_columns:
    3:  "temp_bmp388_degC     — external temperature [°C]"
    4:  "pressure_hPa         — atmospheric pressure [hPa]"
    7:  "temp_mcp9808_degC    — under-regolith temperature [°C] (stored in former 'ax' field)"

expected_results:
  pressure_hPa: "~1013, stable"
  mcp9808_vs_bmp388: >
    MCP9808 cools slower than BMP388 due to regolith insulation.
    ΔT visible but smaller than in EXP-05 (convection through inter-particle air active at 1 atm).

experiment_log:
  wall_clock_start: null
  initial_temp_degC: null
  ambient_temp_degC: null
  wakeup_cycles_count: null
  anomalies: null
