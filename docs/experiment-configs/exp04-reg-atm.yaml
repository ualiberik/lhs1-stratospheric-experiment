# EXP-04: Regolith Configuration — Atmosphere
# Dataset 4 of 5

experiment:
  id: 4
  title: "LHS-1 Regolith Thermal Insulation at 1 atm"
  date: 2026-06-25

hardware:
  esp32-s3:
    installed: true
    role: "Microcontroller"
    shielded: false
  Li-ion-JST-charger:
    installed: true
    role: "Power supply from li-ion battery via JST"
    shielded: false
  mcp9808:
    installed: true
    role: "Under-regolith temperature — DEPENDENT variable"
    shielded: true
  regolith_shield:
    installed: true
    material: "LHS-1 Lunar Highlands Simulant"
    thickness_mm: 3.0-8.0
  bmp388:
    installed: true
    role: "External temperature & pressure — INDEPENDENT variables"
    shielded: false
  vacuum_chamber:
    installed: false
    target_pressure_hPa: null

firmware:
  main_flight_firmware: "firmware/ion_2026_berikov/ion_2026_berikov.ino"
  flash_control_firmware: "firmware/flashutil/flashutil.ino"
  flash_dumper: "firmware/ion_flash_dumper/ion_flash_dumper.ino"
  awake_time_s: 60
  sleep_time_s: 60      # bench-test value; flight firmware uses 600
  write_interval_ms: 100

environment:
  pressure_atm: 1.0      # ambient, no vacuum chamber
  temperature_method: "Heat the cube, wait temperature to equalize, then observe cooling"

protocol:
  steps:
    1: "Upload flashutil to esp32-s3"
    2: "Delete existing log files from flash"
    3: "Upload ion_2026_berikov to esp32-s3"
    4: "Power on the device with Li-ion battery through multimeter"
    5: "Heat the payload externally in 60 degC oven for 10 minutes"
    6: "Wait 10 min for temperature to equalize across the cube"
    7: "Observe cooling to ambient. Run for minimum 45 minutes"
    8: "Upload ion_flash_dumper to esp32-s3"
    9: "Download data"

data_stream:
  note: "CSV, no header. Wakeup boundaries marked by '00000000-000000' separator lines."
  key_columns:
    3:  "temp_bmp388_degC     — external temperature [°C]"
    4:  "pressure_hPa         — atmospheric pressure [hPa]"
    7:  "temp_mcp9808_degC    — under-regolith temperature [°C] (stored in former 'ax' field)"

expected_results:
  pressure_hPa: "~1013, stable"
  mcp9808_vs_bmp388: >
    MCP9808 cools slower than BMP388 due to regolith insulation.
    ΔT visible but smaller than in EXP-05 (convection through inter-particle air active at 1 atm).

analysis:
  # Burst structure: 60 s awake (600 samples at 100 ms) → 60 s sleep → repeat.
  # Cycle period: 120 s. At τ ~ 150 s (1 atm bench test), ~20 burst points
  # span the full cooling curve — sufficient for Newton's law fit.
  # Averaging all 600 samples per burst reduces noise by √600 ≈ 24×,
  # yielding effective precision ~0.003 °C per burst point.

  steps:
    1: >
      Parse raw log: split into bursts at '00000000-000000' separator lines.
      Discard burst 0 (equalization phase, both sensors heating toward T_0).
      Burst 1 is the first post-equalization snapshot (reference starting point).
    2: >
      For each burst k (k = 1, 2, …):
        T_bmp[k]  = mean of column 3 across all rows in burst k
        T_mcp[k]  = mean of column 7 across all rows in burst k
        t[k]      = (k − 1) × 120 s
    3: >
      Estimate ambient temperature T_amb = mean of the last 2 burst averages
      (when both sensors have converged to room temperature).
    4: >
      Fit Newton's cooling law independently to each sensor's burst means:
        T(t) = T_amb + A × exp(−t / τ)
      Free parameters: A (initial excess temperature), τ (cooling time constant).
      Use nonlinear least squares (e.g., scipy.optimize.curve_fit).
    5: >
      If fewer than 3 post-equalization bursts show meaningful temperature change,
      fall back to intra-burst fitting: apply the same Newton's law fit to the 600
      individual samples within burst 1, using t_sample = sample_index × 0.1 s.

  primary_metric: "Insulation ratio R = τ_mcp / τ_bmp"

  comparison_with_no_regolith:
    reference_experiment: "EXP-02 (no regolith, atmosphere)"
    method: >
      Apply identical burst-averaging and Newton's law fit to EXP-02 data
      to obtain R_02 = τ_mcp / τ_bmp under the same conditions but without regolith.
    net_regolith_contribution: "Δ_atm = R_EXP04 − R_EXP02"
    interpretation: >
      Δ_atm > 0 → regolith adds insulation at 1 atm.
      Δ_atm ≈ 0 → regolith has no measurable effect at 1 atm (convection dominates).
    note: >
      R_EXP02 captures the baseline asymmetry between the two sensors
      (different thermal mass, position, capsule geometry) independent of regolith.
      Subtracting it isolates the pure regolith contribution.

status:
  runs_performed: 4
  completed: true